name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ikanimelist
          POSTGRES_USER: ikanime
          POSTGRES_PASSWORD: ikanime
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ikanime -d ikanimelist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ikanime:ikanime@localhost:5432/ikanimelist
      BETTER_AUTH_SECRET: ci-only-secret-that-is-at-least-32-characters
      BETTER_AUTH_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      EMAIL_FROM: no-reply@example.com
      RESEND_API_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
